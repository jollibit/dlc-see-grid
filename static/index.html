<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <title>Babylon.js XR Demo</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no">
  <!-- Bootstrap CSS -->
  <link
    rel="stylesheet"
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
  />
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <!-- Babylon.js CDN -->
  <script src="https://cdn.babylonjs.com/babylon.js"></script>
  <script src="https://cdn.babylonjs.com/loaders/babylonjs.loaders.min.js"></script>
  <script src="https://cdn.babylonjs.com/gui/babylon.gui.min.js"></script>
  <script src="https://cdn.babylonjs.com/xr/babylon.webxr.min.js"></script>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="layout">
    
    <div class="top-header bg-light bg-opacity-85">
      <img src="images/HAW_Kiel_Logo_rgb.png" alt="Company Logo">
    </div>

    <div class="main">
      <canvas id="renderCanvas"></canvas>
      <div id="robot-list" class="sidebar"></div>
      <div id="timeline" class="timeline"></div>
    </div>
  </div>
  <script type="module" src="js/app.js"></script>
</body>
</html>
